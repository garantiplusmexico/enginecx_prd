<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Traza de Código — PM·AI</title>
<style>
  /* ── Bitácora minimalista / empresarial. Sin dependencias externas. ── */
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --ink: #14181f; --muted: #6b7280;
    --line: #e6e8ec; --line-strong: #d4d8de; --accent: #111827;
    --add: #16a34a; --add-bg: #e9f7ee; --del: #dc2626; --del-bg: #fdecec;
    --chip-bg: #f0f2f5; --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #0e1014; --panel: #161a21; --ink: #e7e9ee; --muted: #9aa3b2;
    --line: #232936; --line-strong: #2e3543; --accent: #e7e9ee;
    --add: #3fb950; --add-bg: #122017; --del: #f85149; --del-bg: #251516;
    --chip-bg: #1d232e; --shadow: none;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 30px 26px 84px; }

  /* Encabezado */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  .brand {
    display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600;
    letter-spacing: .02em; color: var(--muted); background: var(--chip-bg);
    border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px;
  }
  .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: #2563eb; }
  .theme-btn {
    appearance: none; cursor: pointer; border: 1px solid var(--line); background: var(--panel);
    color: var(--muted); border-radius: 8px; width: 34px; height: 34px; font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center; transition: .15s;
  }
  .theme-btn:hover { color: var(--ink); border-color: var(--line-strong); }

  .doc-head { border-bottom: 1px solid var(--line); padding-bottom: 18px; margin-bottom: 26px; }
  h1 { font-size: 24px; font-weight: 650; margin: 0 0 6px; letter-spacing: -.01em; }
  .doc-meta { color: var(--muted); font-size: 13.5px; display: flex; gap: 16px; flex-wrap: wrap; }
  .doc-meta b { color: var(--ink); font-weight: 600; }

  /* Sección por entidad */
  .entity { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden; }
  .entity-head { padding: 18px 22px; border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-start; gap: 40px; }
  .entity-id-col { flex: 0 0 230px; min-width: 0; }
  .entity-name { font-family: var(--mono); font-size: 17px; font-weight: 600; }
  .entity-sub { color: var(--muted); font-size: 13px; margin-top: 5px; display: flex; gap: 12px; flex-wrap: wrap; align-items: baseline; }
  .entity-sub code { font-family: var(--mono); }
  .entity-sub .etipo { color: var(--ink); font-weight: 700; letter-spacing: .04em; font-family: var(--sans); }
  /* Descripción de la entidad (qué hace el código): arranca junto al nombre y llena el ancho. */
  .entity-desc { flex: 1 1 auto; color: var(--muted); font-size: 14px; line-height: 1.6; padding-top: 2px; }
  @media (max-width: 760px) { .entity-head { flex-direction: column; gap: 12px; } .entity-id-col { flex-basis: auto; } }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  /* Anchos fijos por columna: TODAS las tablas quedan idénticas aunque alguna celda esté vacía
     (p. ej. una entidad recién dada de alta sin DETALLES). DETALLES (sin ancho) toma el resto. */
  .c-ver { width: 150px; } .c-fec { width: 130px; } .c-cam { width: 150px; } .c-chg { width: 120px; }
  thead th {
    text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); padding: 12px 22px; border-bottom: 1px solid var(--line);
  }
  tbody td { padding: 15px 22px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  .v-commit { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .v-date { color: var(--muted); font-size: 13px; font-family: var(--mono); white-space: nowrap; }
  .badge-current { display: inline-block; margin-top: 5px; font-size: 11px; font-weight: 600;
    color: #2563eb; background: rgba(37,99,235,.10); border-radius: 4px; padding: 1px 7px; }
  .v-cambio { color: var(--ink); font-size: 14px; overflow-wrap: anywhere; }
  .v-cambio.empty { color: var(--muted); font-style: italic; }

  /* Chip de magnitud */
  .mag { display: inline-block; font-size: 12.5px; font-weight: 600; border-radius: 999px;
    padding: 4px 11px; border: 1px solid transparent; white-space: nowrap; }
  .mag-cosmetico { color: #64748b; background: #eef1f5; border-color: #e2e7ee; }
  .mag-firma     { color: #b45309; background: #fef3e2; border-color: #fae3c2; }
  .mag-logica    { color: #1d4ed8; background: #e8effe; border-color: #cfe0fd; }
  .mag-mixto     { color: #7c3aed; background: #f1e9fe; border-color: #e2d2fb; }
  .mag-eliminado { color: #b91c1c; background: #fdecec; border-color: #f7cccc; }
  .mag-alta      { color: #15803d; background: #e9f7ee; border-color: #cdeed8; }
  [data-theme="dark"] .mag-cosmetico { color:#94a3b8; background:#1b212b; border-color:#2a323f; }
  [data-theme="dark"] .mag-firma     { color:#e0a04a; background:#241a0e; border-color:#3a2c14; }
  [data-theme="dark"] .mag-logica    { color:#6ea0f7; background:#121a2b; border-color:#1e2f4d; }
  [data-theme="dark"] .mag-mixto     { color:#b794f6; background:#1c1530; border-color:#2e2150; }
  [data-theme="dark"] .mag-eliminado { color:#f87171; background:#25151610; border-color:#3a1f20; }
  [data-theme="dark"] .mag-alta      { color:#3fb950; background:#10201580; border-color:#1d3a28; }

  /* Columna Cambios (estilo git) */
  .diffstat { font-family: var(--mono); font-size: 14px; background: none; border: 1px solid var(--line);
    border-radius: 7px; padding: 6px 10px; cursor: pointer; transition: .15s; white-space: nowrap; }
  .diffstat:hover { border-color: var(--line-strong); }
  .diffstat[disabled] { cursor: default; opacity: .55; }
  .diffstat .add { color: var(--add); font-weight: 600; }
  .diffstat .del { color: var(--del); font-weight: 600; }
  .diffstat .na { color: var(--muted); }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(8,11,16,.55); display: none;
    align-items: center; justify-content: center; padding: 24px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--line-strong); border-radius: 12px;
    width: min(860px, 100%); max-height: 84vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .modal-title { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .modal-sub { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  .modal-close { appearance: none; cursor: pointer; border: none; background: none; color: var(--muted);
    font-size: 20px; line-height: 1; padding: 4px 6px; border-radius: 6px; }
  .modal-close:hover { color: var(--ink); background: var(--chip-bg); }
  .diff { margin: 0; overflow: auto; font-family: var(--mono); font-size: 12.5px; }
  .diff .row { display: flex; padding: 0 16px; white-space: pre-wrap; word-break: break-word; }
  .diff .row .sign { width: 16px; flex: 0 0 16px; color: var(--muted); user-select: none; }
  .diff .add { background: var(--add-bg); }
  .diff .add .sign { color: var(--add); }
  .diff .del { background: var(--del-bg); }
  .diff .del .sign { color: var(--del); }
  .diff .ctx { color: var(--muted); }

  .empty-state { color: var(--muted); text-align: center; padding: 60px 20px; }
  footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 11.5px; }
</style>
</head>
<body>
  <!-- DATOS DEL REPORTE. /pm-trace reemplaza SOLO el contenido de este <script> (vía inject.mjs). -->
  <script id="trace-data" type="application/json">
{ "__placeholder__": true, "titulo": "Traza de Código", "entidades": [] }
  </script>

  <div class="wrap">
    <div class="topbar">
      <span class="brand"><span class="dot"></span> Project Manager Plugin by EngineCX</span>
      <button class="theme-btn" id="theme" title="Modo oscuro" aria-label="Cambiar tema">☾</button>
    </div>
    <div class="doc-head">
      <h1 id="titulo">Traza de Código</h1>
      <div class="doc-meta" id="meta"></div>
    </div>
    <div id="content"></div>
    <footer>Generado por PM·AI — bitácora de trazabilidad de código.</footer>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="m-title">Diff</div>
          <div class="modal-sub" id="m-sub"></div>
        </div>
        <button class="modal-close" id="m-close" aria-label="Cerrar">×</button>
      </div>
      <pre class="diff" id="m-diff"></pre>
    </div>
  </div>

<script>
  "use strict";

  // ── Diff por líneas (LCS) — vanilla, sin dependencias. ──
  function lcsDiff(aText, bText) {
    // Vacío → 0 líneas (no [""]): así un alta es +N −0 (como un archivo nuevo en git).
    const a = aText ? aText.split("\n") : [];
    const b = bText ? bText.split("\n") : [];
    // Si una de las dos está vacía (alta / borrado), todo es +/-.
    const n = a.length, m = b.length;
    const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
    for (let i = n - 1; i >= 0; i--)
      for (let j = m - 1; j >= 0; j--)
        dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    const out = [];
    let i = 0, j = 0;
    while (i < n && j < m) {
      if (a[i] === b[j]) { out.push({ t: "ctx", s: a[i] }); i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push({ t: "del", s: a[i] }); i++; }
      else { out.push({ t: "add", s: b[j] }); j++; }
    }
    while (i < n) { out.push({ t: "del", s: a[i++] }); }
    while (j < m) { out.push({ t: "add", s: b[j++] }); }
    return out;
  }
  function counts(diff) {
    let add = 0, del = 0;
    for (const r of diff) { if (r.t === "add") add++; else if (r.t === "del") del++; }
    return { add, del };
  }
  const esc = (s) => s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

  // ── Render ──
  const data = (() => {
    try { return JSON.parse(document.getElementById("trace-data").textContent); }
    catch (e) { return null; }
  })();

  function magClass(m) {
    return "mag mag-" + (m && /^(cosmetico|firma|logica|mixto|eliminado)$/.test(m) ? m : "alta");
  }
  function magLabel(m) { return m ? m : "alta"; }

  const overlay = document.getElementById("overlay");
  function openModal(title, sub, diff) {
    document.getElementById("m-title").textContent = title;
    document.getElementById("m-sub").textContent = sub;
    const pre = document.getElementById("m-diff");
    if (!diff || !diff.length) {
      pre.innerHTML = '<div class="row ctx"><span class="sign"></span>Sin diferencias de líneas.</div>';
    } else {
      pre.innerHTML = diff.map((r) => {
        const sign = r.t === "add" ? "+" : r.t === "del" ? "-" : " ";
        return '<div class="row ' + r.t + '"><span class="sign">' + sign + "</span>" + esc(r.s) + "</div>";
      }).join("");
    }
    overlay.classList.add("open");
  }
  function closeModal() { overlay.classList.remove("open"); }
  document.getElementById("m-close").onclick = closeModal;
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  function render() {
    if (!data || data.__placeholder__ || !Array.isArray(data.entidades) || !data.entidades.length) {
      document.getElementById("content").innerHTML =
        '<div class="empty-state">Sin datos de traza. (Plantilla sin generar.)</div>';
      return;
    }
    document.title = data.titulo || "Traza de Código";
    document.getElementById("titulo").textContent = data.titulo || "Traza de Código";
    const meta = [];
    if (data.proyecto) meta.push("<span>Proyecto: <b>" + esc(data.proyecto) + "</b></span>");
    if (data.generado) meta.push("<span>Generado: <b>" + esc(data.generado) + "</b></span>");
    meta.push("<span>Entidades: <b>" + data.entidades.length + "</b></span>");
    document.getElementById("meta").innerHTML = meta.join("");

    const content = document.getElementById("content");
    content.innerHTML = "";
    data.entidades.forEach((ent, ei) => {
      const versiones = ent.versiones || [];
      const sec = document.createElement("div");
      sec.className = "entity";
      let rows = "";
      versiones.forEach((v, vi) => {
        // anterior = la versión inmediatamente más vieja (siguiente en el array newest-first).
        const prev = versiones[vi + 1];
        const tieneCuerpo = typeof v.cuerpo === "string";
        let stat;
        if (!tieneCuerpo) {
          stat = '<button class="diffstat" disabled><span class="na">diff n/d</span></button>';
        } else {
          const anterior = prev && typeof prev.cuerpo === "string" ? prev.cuerpo : "";
          const diff = lcsDiff(anterior, v.cuerpo);
          const c = counts(diff);
          window.__diffs = window.__diffs || {};
          const key = ei + "-" + vi;
          window.__diffs[key] = { diff, title: ent.nombre + "  ·  " + (v.commit_sha || "").slice(0, 8),
            sub: "+" + c.add + " / −" + c.del + " líneas" + (prev ? "" : "  (alta)") };
          stat = '<button class="diffstat" data-k="' + key + '">' +
            '<span class="add">+' + c.add + '</span> ' +
            '<span class="del">−' + c.del + '</span></button>';
        }
        rows +=
          "<tr><td><div class='v-commit'>" + esc((v.commit_sha || "—").slice(0, 8)) + "</div>" +
          (v.is_current ? "<div class='badge-current'>vigente</div>" : "") + "</td>" +
          "<td><span class='v-date'>" + esc(v.fecha || "—") + "</span></td>" +
          "<td><span class='" + magClass(v.magnitud_cambio) + "'>" + esc(magLabel(v.magnitud_cambio)) + "</span></td>" +
          "<td class='v-cambio" + (v.cambio ? "" : " empty") + "'>" + esc(v.cambio || "—") + "</td>" +
          "<td>" + stat + "</td></tr>";
      });
      const tipoUp = (ent.tipo || "").toUpperCase();
      sec.innerHTML =
        "<div class='entity-head'>" +
          "<div class='entity-id-col'>" +
            "<div class='entity-name'>" + esc(ent.nombre || "?") + "</div>" +
            "<div class='entity-sub'><b class='etipo'>" + esc(tipoUp) + "</b>" +
            "<span>" + versiones.length + " versiones</span>" +
            "<span><code>" + esc(ent.ruta || "") + "</code></span></div>" +
          "</div>" +
          (ent.descripcion ? "<div class='entity-desc'>" + esc(ent.descripcion) + "</div>" : "") +
        "</div>" +
        "<table><colgroup><col class='c-ver'><col class='c-fec'><col class='c-cam'><col><col class='c-chg'></colgroup>" +
        "<thead><tr><th>Versión</th><th>Fecha</th><th>Cambio</th><th>Detalles</th><th>Cambios</th></tr></thead>" +
        "<tbody>" + rows + "</tbody></table>";
      content.appendChild(sec);
    });

    content.querySelectorAll(".diffstat[data-k]").forEach((btn) => {
      btn.onclick = () => {
        const d = window.__diffs[btn.getAttribute("data-k")];
        openModal(d.title, d.sub, d.diff);
      };
    });
  }

  // ── Tema (persistente) ──
  const themeBtn = document.getElementById("theme");
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    themeBtn.textContent = t === "dark" ? "☀" : "☾";
  }
  applyTheme(localStorage.getItem("pmTraceTheme") || "light");
  themeBtn.onclick = () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem("pmTraceTheme", next);
    applyTheme(next);
  };

  render();
</script>
</body>
</html>
